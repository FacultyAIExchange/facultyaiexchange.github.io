title: Faculty AI Exchange
description: Shared examples and resources for faculty incorporating generative AI into teaching, research, and academic work ethically and responsibly.
url: "https://trholmes.github.io"
baseurl: "/FacultyAIGallery"
repository_url: "https://github.com/trholmes/FacultyAIGallery"

markdown: kramdown

collections:
  examples:
    output: true
    permalink: /examples/:name/
  resources:
    output: true
    permalink: /resources/:name/

defaults:
  - scope:
      path: ""
      type: "examples"
    values:
      layout: example
  - scope:
      path: ""
      type: "resources"
    values:
      layout: resource

exclude:
  - README.md
  - docs/
  - skills/
  - Gemfile
  - Gemfile.lock
  - .bundle/
  - vendor/
