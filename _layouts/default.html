<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/gallery/' | relative_url }}">AI Usage Gallery</a>
        <a href="{{ '/resources/' | relative_url }}">Resources</a>
        <a href="{{ '/contribute/' | relative_url }}">Contribute</a>
        <a class="gh" href="{{ site.repository_url }}">GitHub</a>
      </nav>
    </header>

    {{ content }}

    <footer class="site-footer">
      <p>Faculty AI Exchange — a shared, open resource for responsible faculty AI practice.</p>
      <p><a href="{{ site.repository_url }}">Suggest a contribution on GitHub</a></p>
    </footer>
  </body>
</html>
